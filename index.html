<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#d4a853">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Filmkveld">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>🎬 Filmkveld — Silje & Bjørn Tore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1a1a24;
  --gold:#d4a853;
  --gold-dim:#a07d3a;
  --cream:#f0e6d2;
  --muted:#6b6b7b;
  --text:#e8e4de;
  --accent:#c44b4b;
}
html{font-size:16px}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* Film grain overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:9999;
}

/* Ambient light streaks */
.ambient{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}
.ambient::before{
  content:'';
  position:absolute;
  width:600px;height:600px;
  top:-200px;right:-100px;
  background:radial-gradient(circle,rgba(212,168,83,0.06) 0%,transparent 70%);
  animation:drift 20s ease-in-out infinite;
}
.ambient::after{
  content:'';
  position:absolute;
  width:500px;height:500px;
  bottom:-150px;left:-100px;
  background:radial-gradient(circle,rgba(196,75,75,0.04) 0%,transparent 70%);
  animation:drift 25s ease-in-out infinite reverse;
}
@keyframes drift{
  0%,100%{transform:translate(0,0)}
  50%{transform:translate(40px,30px)}
}

.container{
  max-width:680px;
  margin:0 auto;
  padding:2rem 1.5rem 4rem;
  position:relative;
  z-index:1;
}

/* Header */
header{
  text-align:center;
  padding:2rem 0 0.5rem;
}
.logo-line{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:1rem;
  margin-bottom:0.5rem;
}
.logo-line::before,.logo-line::after{
  content:'';
  width:40px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim));
}
.logo-line::after{
  background:linear-gradient(90deg,var(--gold-dim),transparent);
}
.logo-icon{
  font-size:1.4rem;
  color:var(--gold);
  letter-spacing:0.3em;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.4rem,6vw,3.6rem);
  font-weight:900;
  color:var(--cream);
  letter-spacing:-0.02em;
  line-height:1.1;
}
h1 em{
  font-style:italic;
  font-weight:400;
  color:var(--gold);
}
.subtitle{
  font-size:0.8rem;
  color:var(--muted);
  letter-spacing:0.25em;
  text-transform:uppercase;
  margin-top:0.75rem;
  font-weight:500;
}
.collection-count{
  font-family:'Space Mono',monospace;
  font-size:0.7rem;
  color:var(--gold-dim);
  margin-top:0.5rem;
  letter-spacing:0.1em;
}

/* Main card area */
.stage{
  margin:1rem 0;
  perspective:1000px;
}

.card-wrapper{
  position:relative;
  min-height:320px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.film-card{
  background:linear-gradient(145deg,var(--surface) 0%,var(--surface2) 100%);
  border:1px solid rgba(212,168,83,0.15);
  border-radius:16px;
  padding:2rem 2rem;
  text-align:center;
  width:100%;
  position:relative;
  overflow:hidden;
  transition:transform 0.6s cubic-bezier(0.23,1,0.32,1),opacity 0.4s ease;
}
.film-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0.6;
}

.card-idle .film-card{
  transform:scale(1);
}

/* Spinning state */
.card-spinning .film-card{
  animation:cardPulse 0.15s ease-in-out infinite alternate;
}
@keyframes cardPulse{
  0%{transform:scale(0.98);opacity:0.7}
  100%{transform:scale(1.02);opacity:1}
}

/* Reveal state */
.card-reveal .film-card{
  animation:cardReveal 0.8s cubic-bezier(0.23,1,0.32,1) forwards;
}
@keyframes cardReveal{
  0%{transform:scale(0.9) rotateX(10deg);opacity:0}
  50%{transform:scale(1.05) rotateX(-2deg);opacity:1}
  100%{transform:scale(1) rotateX(0);opacity:1}
}

.film-number{
  font-family:'Space Mono',monospace;
  font-size:0.65rem;
  color:var(--gold-dim);
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:1.5rem;
}

.film-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,4.5vw,2.4rem);
  font-weight:700;
  color:var(--cream);
  line-height:1.2;
  margin-bottom:0.5rem;
  display:flex;
  align-items:center;
  justify-content:center;
}

.film-year{
  font-family:'Space Mono',monospace;
  font-size:1rem;
  color:var(--gold);
  margin-bottom:1.5rem;
}

.film-link{
  display:inline-flex;
  align-items:center;
  gap:0.4rem;
  color:var(--muted);
  text-decoration:none;
  font-size:0.75rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  transition:color 0.3s;
  font-weight:500;
}
.film-link:hover{
  color:var(--gold);
}
.film-link svg{
  width:12px;height:12px;
  transition:transform 0.3s;
}
.film-link:hover svg{
  transform:translate(2px,-2px);
}

/* Poster */
.film-poster-row{
  display:flex;
  gap:1.5rem;
  align-items:flex-start;
  margin:1rem 0 0.8rem;
  text-align:left;
}
.film-poster-wrap{
  width:200px;
  min-width:200px;
  height:300px;
  border-radius:8px;
  overflow:hidden;
  position:relative;
  background:var(--surface2);
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(212,168,83,0.1);
  flex-shrink:0;
}
.film-poster-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 0.6s ease;
}
.film-poster-wrap img.loaded{
  opacity:1;
}
.film-poster-wrap .poster-placeholder{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2.5rem;
  opacity:0.3;
}
.poster-loading{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.poster-loading::after{
  content:'';
  width:24px;height:24px;
  border:2px solid var(--gold-dim);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:posterSpin 0.8s linear infinite;
}
@keyframes posterSpin{to{transform:rotate(360deg)}}

/* Poster side info */
.poster-side-info{
  display:flex;
  flex-direction:column;
  gap:0.6rem;
  padding-top:0.2rem;
  flex:1;
  min-width:0;
}

/* User score */
.score-row{
  display:flex;
  align-items:center;
  gap:0.7rem;
  margin-bottom:0.2rem;
}
.score-ring{
  width:48px;height:48px;
  position:relative;
  flex-shrink:0;
}
.score-ring svg{
  width:100%;height:100%;
  transform:rotate(-90deg);
}
.score-ring .ring-bg{
  fill:none;
  stroke:rgba(255,255,255,0.08);
  stroke-width:3;
}
.score-ring .ring-fill{
  fill:none;
  stroke-width:3;
  stroke-linecap:round;
  transition:stroke-dashoffset 1s ease;
}
.score-ring .score-text{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Space Mono',monospace;
  font-size:0.75rem;
  font-weight:700;
  color:var(--cream);
}
.score-label{
  font-family:'DM Sans',sans-serif;
  font-size:0.65rem;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
}

/* Key info items */
.key-info{
  display:flex;
  flex-direction:column;
  gap:0.3rem;
}
.key-info-item{
  display:flex;
  align-items:baseline;
  gap:0.5rem;
}
.key-label{
  font-family:'DM Sans',sans-serif;
  font-size:0.6rem;
  font-weight:500;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
  min-width:50px;
}
.key-value{
  font-family:'DM Sans',sans-serif;
  font-size:0.95rem;
  font-weight:500;
  color:var(--cream);
}

/* Film details (kept for fallback) */
.film-details{
  margin-top:1.2rem;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:0.5rem 1rem;
  font-family:'Space Mono',monospace;
  font-size:0.7rem;
  color:var(--muted);
}
.film-details .detail-item{
  display:flex;
  align-items:center;
  gap:0.3rem;
}
.detail-dot{
  width:3px;height:3px;
  border-radius:50%;
  background:var(--gold-dim);
  flex-shrink:0;
}
.film-genres{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:0.4rem;
  margin-top:0.8rem;
}
.genre-tag{
  font-family:'DM Sans',sans-serif;
  font-size:0.65rem;
  font-weight:500;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--gold);
  border:1px solid rgba(212,168,83,0.25);
  padding:0.25rem 0.65rem;
  border-radius:20px;
  background:rgba(212,168,83,0.05);
}
.film-overview{
  margin-top:0.8rem;
  font-family:'DM Sans',sans-serif;
  font-size:0.8rem;
  line-height:1.5;
  color:var(--text);
  opacity:0.8;
  text-align:left;
}
.film-overview.clamped::after{
  display:none;
}

@media(max-width:540px){
  .film-poster-row{
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .film-poster-wrap{
    width:180px;
    min-width:180px;
    height:270px;
  }
  .key-info{
    align-items:center;
  }
  .key-info-item{
    justify-content:center;
  }
  .score-row{
    justify-content:center;
  }
}

/* Cast */
.cast-section{
  margin-top:1rem;
  padding-top:0.8rem;
  border-top:1px solid rgba(255,255,255,0.05);
}

/* Tagline */
.film-tagline{
  font-family:'Playfair Display',serif;
  font-size:1.05rem;
  font-style:italic;
  color:var(--gold);
  line-height:1.4;
  margin-top:0.4rem;
  opacity:0.9;
}

/* Trailer button */
.trailer-section{
  margin-top:1.2rem;
  text-align:center;
}
.trailer-btn{
  display:inline-flex;
  align-items:center;
  gap:0.6rem;
  font-family:'DM Sans',sans-serif;
  font-size:0.8rem;
  font-weight:600;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--cream);
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  padding:0.7rem 1.5rem;
  border-radius:8px;
  text-decoration:none;
  transition:all 0.3s ease;
}
.trailer-btn:hover{
  background:rgba(196,75,75,0.15);
  border-color:var(--accent);
  color:white;
}
.trailer-btn .play-icon{
  width:20px;height:20px;
  background:var(--accent);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.trailer-btn .play-icon svg{
  width:8px;height:8px;
  fill:white;
  margin-left:1px;
}
.cast-title{
  font-size:0.65rem;
  color:var(--muted);
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:0.8rem;
  font-weight:500;
}
.cast-grid{
  display:flex;
  gap:0.8rem;
  overflow-x:auto;
  padding-bottom:0.5rem;
  scrollbar-width:none;
  justify-content:center;
  flex-wrap:wrap;
}
.cast-grid::-webkit-scrollbar{display:none}
.cast-member{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.4rem;
  min-width:70px;
  max-width:80px;
  opacity:0;
  animation:fadeUp 0.4s ease forwards;
}
.cast-photo{
  width:56px;height:56px;
  border-radius:50%;
  overflow:hidden;
  background:var(--surface2);
  border:2px solid rgba(212,168,83,0.15);
  flex-shrink:0;
}
.cast-photo img{
  width:100%;height:100%;
  object-fit:cover;
}
.cast-photo .cast-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;opacity:0.3;
  background:var(--surface2);
}
.cast-name{
  font-family:'DM Sans',sans-serif;
  font-size:0.65rem;
  font-weight:600;
  color:var(--cream);
  text-align:center;
  line-height:1.2;
}
.cast-character{
  font-family:'DM Sans',sans-serif;
  font-size:0.58rem;
  color:var(--muted);
  text-align:center;
  line-height:1.2;
}

/* Idle state content */
.idle-content{
  padding:0;
}
.idle-hero{
  width:calc(100% + 4rem);
  margin:-2rem -2rem 1.5rem;
  border-radius:16px 16px 0 0;
  overflow:hidden;
  position:relative;
  aspect-ratio:16/10;
}
.idle-hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.idle-hero::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent 40%, var(--surface) 100%);
}
.idle-text-wrap{
  text-align:center;
  padding:0 1rem;
}
.idle-icon{
  font-size:2.5rem;
  margin-bottom:0.8rem;
  opacity:0.6;
}
.idle-text{
  font-family:'Playfair Display',serif;
  font-size:1.3rem;
  color:var(--muted);
  font-style:italic;
}

/* Spinning title scramble */
.spinning-title{
  font-family:'Space Mono',monospace;
  font-size:1rem;
  color:var(--gold-dim);
  opacity:0.6;
}

/* Button */
.btn-area{
  text-align:center;
  margin:2rem 0;
}
.btn-area.has-mood{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1rem;
}

.spin-btn{
  font-family:'DM Sans',sans-serif;
  font-size:0.85rem;
  font-weight:600;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--bg);
  background:linear-gradient(135deg,var(--gold) 0%,#e8c06a 50%,var(--gold) 100%);
  background-size:200% 200%;
  border:none;
  padding:1rem 3rem;
  border-radius:60px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
  width:100%;
  max-width:340px;
}

.mood-divider{
  display:flex;
  align-items:center;
  gap:1rem;
  width:100%;
  max-width:340px;
  color:var(--muted);
  font-size:0.65rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
}
.mood-divider::before,.mood-divider::after{
  content:'';
  flex:1;
  height:1px;
  background:rgba(255,255,255,0.08);
}

.mood-grid{
  display:flex;
  gap:0.6rem;
  width:100%;
  max-width:380px;
}
.mood-btn{
  flex:1;
  font-family:'DM Sans',sans-serif;
  font-size:0.6rem;
  font-weight:600;
  letter-spacing:0.05em;
  text-transform:uppercase;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
  padding:0.6rem 0.3rem;
  cursor:pointer;
  transition:all 0.3s ease;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.3rem;
  background:rgba(255,255,255,0.03);
  color:var(--text);
  min-width:0;
}
.mood-btn:hover{
  transform:translateY(-2px);
}
.mood-btn .mood-emoji{
  font-size:1.2rem;
}
.mood-btn.mood-horror{color:#c44b4b;border-color:rgba(196,75,75,0.3)}
.mood-btn.mood-horror:hover{background:rgba(196,75,75,0.1);box-shadow:0 4px 20px rgba(196,75,75,0.2)}
.mood-btn.mood-thriller{color:#4b8fc4;border-color:rgba(75,143,196,0.3)}
.mood-btn.mood-thriller:hover{background:rgba(75,143,196,0.1);box-shadow:0 4px 20px rgba(75,143,196,0.2)}
.mood-btn.mood-drama{color:#c4a34b;border-color:rgba(196,163,75,0.3)}
.mood-btn.mood-drama:hover{background:rgba(196,163,75,0.1);box-shadow:0 4px 20px rgba(196,163,75,0.2)}
.mood-btn.mood-scifi{color:#8b5cf6;border-color:rgba(139,92,246,0.3)}
.mood-btn.mood-scifi:hover{background:rgba(139,92,246,0.1);box-shadow:0 4px 20px rgba(139,92,246,0.2)}
.mood-btn.mood-animation{color:#f472b6;border-color:rgba(244,114,182,0.3)}
.mood-btn.mood-animation:hover{background:rgba(244,114,182,0.1);box-shadow:0 4px 20px rgba(244,114,182,0.2)}

.mood-btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
  transform:none;
}

/* Active mood indicator */
.active-mood{
  display:none;
  align-items:center;
  justify-content:center;
  gap:0.5rem;
  font-family:'DM Sans',sans-serif;
  font-size:0.7rem;
  color:var(--muted);
  letter-spacing:0.1em;
  margin-bottom:0.5rem;
}
.active-mood.visible{
  display:flex;
}
.active-mood .mood-reset{
  color:var(--gold-dim);
  cursor:pointer;
  text-decoration:underline;
  background:none;
  border:none;
  font:inherit;
  letter-spacing:inherit;
  transition:color 0.2s;
}
.active-mood .mood-reset:hover{
  color:var(--gold);
}
.spin-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(212,168,83,0.3);
  background-position:100% 100%;
}
.spin-btn:active{
  transform:translateY(0);
}
.spin-btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}

/* History */
.history{
  margin-top:3rem;
  border-top:1px solid rgba(212,168,83,0.1);
  padding-top:2rem;
}
.history-title{
  font-size:0.7rem;
  color:var(--muted);
  letter-spacing:0.25em;
  text-transform:uppercase;
  margin-bottom:1rem;
  font-weight:500;
}
.history-list{
  display:flex;
  flex-direction:column;
  gap:0.5rem;
}
.history-item{
  display:flex;
  align-items:baseline;
  gap:0.75rem;
  padding:0.6rem 0;
  border-bottom:1px solid rgba(255,255,255,0.03);
  opacity:0;
  animation:fadeUp 0.4s ease forwards;
}
.history-item .h-num{
  font-family:'Space Mono',monospace;
  font-size:0.6rem;
  color:var(--gold-dim);
  min-width:1.5rem;
}
.history-item .h-name{
  font-family:'Playfair Display',serif;
  font-size:0.95rem;
  color:var(--cream);
  flex:1;
}
.history-item .h-year{
  font-family:'Space Mono',monospace;
  font-size:0.75rem;
  color:var(--muted);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* Footer */
footer{
  text-align:center;
  margin-top:3rem;
  padding-top:1.5rem;
  border-top:1px solid rgba(255,255,255,0.04);

// Mood / genre filter
let activeMoodFilter = null; // null or 'horror'|'thriller'|'drama'
const MOOD_MAP = {
  horror: { genre: 'Horror', label: '👻 Skummel', tmdbIds: [27] },
  thriller: { genre: 'Thriller', label: '🔫 Spennende', tmdbIds: [53] },
  drama: { genre: 'Drama/Documentary', label: '🎭 Smartysmart', tmdbIds: [18, 99] },
  scifi: { genre: 'Fantasy/Sci-Fi/Animation', label: '🚀 Urealistisk', tmdbIds: [14, 878, 16] }
};

function setMood(mood) {
  activeMoodFilter = mood;
  usedIndexes.clear();
  const info = MOOD_MAP[mood];
  document.getElementById('activeMood').classList.add('visible');
  document.getElementById('activeMoodText').textContent = `Stemning: ${info.label}`;
  document.getElementById('moodDivider').style.display = 'none';
  document.getElementById('moodGrid').style.display = 'none';
  btn.textContent = `Velg en ${info.label.split(' ')[1].toLowerCase()} film`;
  spin();
}

function resetMood() {
  activeMoodFilter = null;
  usedIndexes.clear();
  document.getElementById('activeMood').classList.remove('visible');
  document.getElementById('moodDivider').style.display = '';
  document.getElementById('moodGrid').style.display = '';
  btn.textContent = 'Velg en tilfeldig film';
}

function getUnusedMovie() {
  if (usedIndexes.size >= MOVIES.length) {
    usedIndexes.clear();
  }
  let idx;
  do {
    idx = Math.floor(Math.random() * MOVIES.length);
  } while (usedIndexes.has(idx));
  usedIndexes.add(idx);
  return MOVIES[idx];
}

// Quick genre check via TMDB search (only 1 API call)
async function checkGenre(title, year, tmdbGenreIds) {
  try {
    const q = encodeURIComponent(title);
    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${q}&year=${year}&language=en-US`);
    const data = await res.json();
    const movie = data.results?.find(m => m.release_date?.startsWith(year)) || data.results?.[0];
    if (!movie) return false;
    return (movie.genre_ids || []).some(id => tmdbGenreIds.includes(id));
  } catch(e) {
    return false;
  }
}

const TMDB_KEY = 'f06fc1d869f839b075d23d338228007a';
const TMDB_IMG = 'https://image.tmdb.org/t/p/w342';
const TMDB_PROFILE = 'https://image.tmdb.org/t/p/w185';

function spin() {
  if (spinning) return;
  spinning = true;
  // Scroll to top - use multiple methods for PWA compatibility
  document.body.scrollTop = 0;
  document.documentElement.scrollTop = 0;
  window.scrollTo(0, 0);
  btn.disabled = true;
  document.querySelectorAll('.mood-btn').forEach(b => b.disabled = true);
  btn.textContent = 'Trekker…';

  wrapper.className = 'card-wrapper card-spinning';

  // Show random titles quickly during spin
  let flickerCount = 0;
  const totalFlickers = 20;
  const flickerInterval = setInterval(() => {
    const rand = MOVIES[Math.floor(Math.random() * MOVIES.length)];
    content.innerHTML = `
      <div class="film-number">Trekker fra ${MOVIES.length} filmer…</div>
      <div class="film-title"><span class="spinning-title">${rand[0]}</span></div>
      <div class="film-year">${rand[1]}</div>
    `;
    flickerCount++;
    if (flickerCount >= totalFlickers) {
      clearInterval(flickerInterval);
      content.innerHTML = `
        <div class="film-number">Trekker fra ${MOVIES.length} filmer…</div>
        <div class="film-title"><span class="spinning-title">Film funnet!</span></div>
        <div class="film-year">&nbsp;</div>
      `;
      setTimeout(() => reveal(), 600);
    }
  }, 80);
}

async function fetchMovieDetails(title, year) {
  try {
    const q = encodeURIComponent(title);
    const searchRes = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${q}&year=${year}&language=en-US`);
    const searchData = await searchRes.json();
    let movie = searchData.results?.find(m => m.release_date?.startsWith(year)) || searchData.results?.[0];
    if (!movie) return null;

    // Fetch full details + credits + videos in parallel
    const [detailRes, creditsRes, videosRes] = await Promise.all([
      fetch(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_KEY}&language=en-US`),
      fetch(`https://api.themoviedb.org/3/movie/${movie.id}/credits?api_key=${TMDB_KEY}&language=en-US`),
      fetch(`https://api.themoviedb.org/3/movie/${movie.id}/videos?api_key=${TMDB_KEY}&language=en-US`)
    ]);
    const details = await detailRes.json();
    const credits = await creditsRes.json();
    const videos = await videosRes.json();

    // Find director(s)
    const directors = (credits.crew || []).filter(c => c.job === 'Director').map(c => c.name);

    // Find trailer (prefer YouTube official trailers)
    const trailer = (videos.results || []).find(v => v.type === 'Trailer' && v.site === 'YouTube')
      || (videos.results || []).find(v => v.site === 'YouTube');
    const trailerUrl = trailer ? `https://www.youtube.com/watch?v=${trailer.key}` : null;

    return {
      poster: movie.poster_path ? TMDB_IMG + movie.poster_path : null,
      runtime: details.runtime || null,
      genres: details.genres?.map(g => g.name) || [],
      overview: details.overview || null,
      score: movie.vote_average ? Math.round(movie.vote_average * 10) : null,
      directors,
      tagline: details.tagline || null,
      trailerUrl,
      cast: (credits.cast || []).slice(0, 6).map(c => ({
        name: c.name,
        character: c.character,
        photo: c.profile_path ? TMDB_PROFILE + c.profile_path : null
      }))
    };
  } catch(e) {
    return null;
  }
}

function formatRuntime(min) {
  if (!min) return '';
  const h = Math.floor(min / 60);
  const m = min % 60;
  return h > 0 ? `${h}t ${m}min` : `${m}min`;
}

function scoreColor(pct) {
  if (pct >= 70) return '#21d07a';
  if (pct >= 50) return '#d2d531';
  return '#db2360';
}

async function reveal() {
  let chosen;
  
  // If mood filter is active, find a matching movie
  if (activeMoodFilter) {
    const mood = MOOD_MAP[activeMoodFilter];
    let attempts = 0;
    const maxAttempts = 40;
    
    while (attempts < maxAttempts) {
      chosen = getUnusedMovie();
      const matches = await checkGenre(chosen[0], chosen[1], mood.tmdbIds);
      if (matches) break;
      attempts++;
      // If we've tried too many, give up and show anyway
      if (attempts >= maxAttempts) {
        // Reset and pick without filter
        chosen = getUnusedMovie();
        break;
      }
    }
  } else {
    chosen = getUnusedMovie();
  }

  wrapper.className = 'card-wrapper card-reveal';

  content.innerHTML = `
    <div class="film-number">Kveldens film</div>
    <div class="film-title">${chosen[0]}</div>
    <div class="film-poster-row">
      <div class="film-poster-wrap">
        <div class="poster-loading"></div>
        <div class="poster-placeholder">🎬</div>
      </div>
      <div class="poster-side-info" id="sideInfo">
        <div class="key-info">
          <div class="key-info-item"><span class="key-label">År</span><span class="key-value">${chosen[1]}</span></div>
        </div>
      </div>
    </div>
    <div id="filmMeta"></div>
  `;

  // Fetch full details async
  fetchMovieDetails(chosen[0], chosen[1]).then(info => {
    if (!info) {
      const wrap = content.querySelector('.film-poster-wrap');
      if (wrap) wrap.querySelector('.poster-loading')?.remove();
      return;
    }

    // Poster
    const wrap = content.querySelector('.film-poster-wrap');
    if (wrap && info.poster) {
      const img = document.createElement('img');
      img.alt = chosen[0];
      img.src = info.poster;
      img.onload = () => {
        wrap.querySelector('.poster-loading')?.remove();
        wrap.querySelector('.poster-placeholder')?.remove();
        img.classList.add('loaded');
      };
      img.onerror = () => wrap.querySelector('.poster-loading')?.remove();
      wrap.appendChild(img);
    } else if (wrap) {
      wrap.querySelector('.poster-loading')?.remove();
    }

    // Side info: score + key details
    const side = document.getElementById('sideInfo');
    if (side) {
      let sideHtml = '';

      // Score ring
      if (info.score !== null) {
        const circ = 2 * Math.PI * 20;
        const offset = circ - (info.score / 100) * circ;
        const col = scoreColor(info.score);
        sideHtml += `
          <div class="score-row">
            <div class="score-ring">
              <svg viewBox="0 0 44 44">
                <circle class="ring-bg" cx="22" cy="22" r="20"/>
                <circle class="ring-fill" cx="22" cy="22" r="20" 
                  stroke="${col}" 
                  stroke-dasharray="${circ}" 
                  stroke-dashoffset="${offset}"/>
              </svg>
              <div class="score-text">${info.score}%</div>
            </div>
            <div class="score-label">User Score</div>
          </div>`;
      }

      // Key info
      sideHtml += '<div class="key-info">';
      sideHtml += `<div class="key-info-item"><span class="key-label">År</span><span class="key-value">${chosen[1]}</span></div>`;
      if (info.runtime) {
        sideHtml += `<div class="key-info-item"><span class="key-label">Tid</span><span class="key-value">${formatRuntime(info.runtime)}</span></div>`;
      }
      if (info.genres.length) {
        sideHtml += `<div class="key-info-item"><span class="key-label">Sjanger</span><span class="key-value">${info.genres.join(', ')}</span></div>`;
      }
      if (info.directors.length) {
        sideHtml += `<div class="key-info-item"><span class="key-label">Regi</span><span class="key-value">${info.directors.join(', ')}</span></div>`;
      }
      sideHtml += '</div>';

      if (info.tagline) {
        sideHtml += `<div class="film-tagline">"${info.tagline}"</div>`;
      }

      side.innerHTML = sideHtml;
    }

    // Below: overview + cast + trailer
    const meta = document.getElementById('filmMeta');
    if (!meta) return;
    let html = '';

    if (info.overview) {
      html += `<div class="film-overview">${info.overview}</div>`;
    }

    if (info.cast.length) {
      html += `<div class="cast-section"><div class="cast-title">Top Billed Cast</div><div class="cast-grid">`;
      info.cast.forEach((c, i) => {
        const photo = c.photo
          ? `<img src="${c.photo}" alt="${c.name}" loading="lazy">`
          : `<div class="cast-placeholder">👤</div>`;
        html += `
          <div class="cast-member" style="animation-delay:${i * 0.08}s">
            <div class="cast-photo">${photo}</div>
            <div class="cast-name">${c.name}</div>
          </div>`;
      });
      html += `</div></div>`;
    }

    if (info.trailerUrl) {
      html += `
        <div class="trailer-section">
          <a class="trailer-btn" href="${info.trailerUrl}" target="_blank" rel="noopener">
            <span class="play-icon"><svg viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg></span>
            Se trailer
          </a>
        </div>`;
    }

    meta.innerHTML = html;
  });

  // Add to history
  history.unshift(chosen);
  updateHistory();

  btn.textContent = activeMoodFilter 
    ? `Trekk en ny ${MOOD_MAP[activeMoodFilter].label.split(' ')[1].toLowerCase()} film`
    : 'Trekk igjen';
  btn.disabled = false;
  document.querySelectorAll('.mood-btn').forEach(b => b.disabled = false);
  spinning = false;
}

function updateHistory() {
  if (history.length <= 1) return;
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  section.style.display = 'block';

  // Show previous picks (skip first which is current)
  const prev = history.slice(1, 8);
  list.innerHTML = prev.map((m, i) => `
    <div class="history-item" style="animation-delay:${i * 0.05}s">
      <span class="h-num">${i + 1}.</span>
      <span class="h-name">${m[0]}</span>
      <span class="h-year">${m[1]}</span>
    </div>
  `).join('');
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
